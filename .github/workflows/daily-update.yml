name: Price Update (Every 15 min)

on:
  schedule:
    # Runs every 15 min, 24/7 — keeps news and prices fresh at all times
    - cron: "*/15 * * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit back to the repo

# Opt into Node.js 24 now to avoid breakage after June 2 2026 forced cutover
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.54,<0.3"

      - name: Fetch prices and update index.html
        run: python fetch_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: price update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Rebase onto latest remote before pushing to avoid conflicts from concurrent runs
          git pull --rebase origin main
          git push origin main
