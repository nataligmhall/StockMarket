name: Daily Price Update

on:
  schedule:
    # Runs at 21:00 UTC (4pm ET / 1pm PT) — 30 min after US market close
    - cron: "0 21 * * 1-5"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit back to the repo

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices and update index.html
        run: python fetch_prices.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: daily price update $(date -u +'%Y-%m-%d')"
          git push
