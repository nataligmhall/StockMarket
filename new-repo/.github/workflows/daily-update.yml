name: Update Stock Dashboard

on:
  schedule:
    # Every 15 minutes during weekdays
    - cron: '*/15 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "yfinance>=0.2.54,<0.3"

      - name: Fetch stock data and update dashboard
        run: python fetch_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update stock data [skip ci]"
            # Rebase before push to handle concurrent runs gracefully
            for i in 1 2 3 4; do
              git pull --rebase origin main && break
              echo "Rebase attempt $i failed, retrying..."
              sleep $((i * 2))
            done
            git push -u origin main
          fi
